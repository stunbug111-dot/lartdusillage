[[headers]]
  for = "/*"
  [headers.values]
    # Empêche le clickjacking (iframes non autorisés)
    X-Frame-Options = "DENY"

    # Empêche le MIME sniffing
    X-Content-Type-Options = "nosniff"

    # Force HTTPS pendant 1 an, inclus sous-domaines
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # Contrôle les infos envoyées en referrer
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Désactive l'accès aux capteurs/API sensibles
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(self)"

    # Content Security Policy
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com https://www.gstatic.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://*.googleapis.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://api.emailjs.com https://api.stripe.com; frame-src https://js.stripe.com; img-src 'self' data: blob: https:; object-src 'none'; base-uri 'self';"

    # Protection XSS (legacy browsers)
    X-XSS-Protection = "1; mode=block"
